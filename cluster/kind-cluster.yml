apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: idp-platform

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP

  - role: worker
    labels:
      env: dev

  - role: worker
    labels:
      env: staging

  - role: worker
    labels:
      env: prod
