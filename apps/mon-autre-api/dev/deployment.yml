apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: mon-autre-api
    env: dev
    managed-by: idp-cli
  name: mon-autre-api
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mon-autre-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: mon-autre-api
        env: dev
    spec:
      containers:
      - image: nginx:alpine
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        name: mon-autre-api
        ports:
        - containerPort: 80
        readinessProbe:
          failureThreshold: 2
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
      serviceAccountName: deployer
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: mon-autre-api
    env: dev
    managed-by: idp-cli
  name: mon-autre-api
  namespace: dev
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: mon-autre-api
  type: ClusterIP
