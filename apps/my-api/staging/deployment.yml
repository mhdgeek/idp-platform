apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: my-api
    env: staging
    managed-by: idp-cli
  name: my-api
  namespace: staging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: my-api
        env: staging
    spec:
      containers:
      - image: nginx:alpine
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        name: my-api
        ports:
        - containerPort: 80
        readinessProbe:
          failureThreshold: 2
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 400m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      serviceAccountName: deployer
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: my-api
    env: staging
    managed-by: idp-cli
  name: my-api
  namespace: staging
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: my-api
  type: ClusterIP
